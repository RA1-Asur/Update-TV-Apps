<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Update</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Google Sans','Roboto',Arial,sans-serif;
    background:#F1F2F6; color:#1B1B1F;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:20px;
  }
  .wrap{width:100%; max-width:420px; display:flex; flex-direction:column; gap:16px;}
  a.imgbtn{
    display:block; width:100%; border-radius:16px; overflow:hidden;
    box-shadow:0 4px 16px rgba(32,33,36,0.16);
    text-decoration:none; transition:transform .1s ease;
  }
  a.imgbtn:active{transform:scale(0.97);}
  a.imgbtn img{width:100%; aspect-ratio:4/3; object-fit:cover; display:block;}
  .empty{
    color:#5F6368; font-size:14px; text-align:center; padding:40px 20px;
    border:2px dashed #DADCE0; border-radius:18px; width:100%;
  }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="empty">Loading…</div>
</div>

<script>
(function(){
  const BLOB_URL = "https://gist.githubusercontent.com/RA1-Asur/3b91533f1d388f473cca0821f38dfe87/raw/config.json";
  const app = document.getElementById("app");

  function esc(s){ return (s||"").replace(/"/g, "&quot;"); }

  function render(data){
    const items = Array.isArray(data.items) ? data.items.filter(it => it && it.image) : [];

    if (!items.length){
      app.innerHTML = '<div class="empty">No update available right now</div>';
      return;
    }

    let html = "";
    items.forEach(function(it){
      const img = '<img src="'+esc(it.image)+'" alt="" onerror="this.parentElement.style.display=\'none\'" />';
      if (it.link){
        html += '<a class="imgbtn" href="'+esc(it.link)+'">'+img+'</a>';
      } else {
        html += '<div class="imgbtn" style="cursor:default;">'+img+'</div>';
      }
    });
    app.innerHTML = html;
  }

  fetch(BLOB_URL + "?v=" + Date.now(), { cache: "no-store" })
    .then(r => { if (!r.ok) throw new Error("bad response"); return r.json(); })
    .then(render)
    .catch(() => {
      app.innerHTML = '<div class="empty">Couldn\'t load right now. Check your connection and reopen the page.</div>';
    });
})();
</script>
</body>
</html>
